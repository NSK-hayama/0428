name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake clang-format

      - name: Configure
        run: cmake -S . -B build -DCMAKE_CXX_FLAGS="-Wall -Wextra -Werror"

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Formatting check
        run: |
          git ls-files '*.cpp' '*.h' | xargs clang-format -style=file --dry-run --Werror