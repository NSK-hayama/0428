name: PR Skill Gate

on:
  pull_request:

jobs:
  skill-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: README must exist
        run: |
          if [ ! -f README.md ]; then
            echo "❌ Skill violation: README.md がありません"
            exit 1
          fi
          echo "✅ README.md OK"

      - name: skill directory must exist
        run: |
          if [ ! -d skill ]; then
            echo "❌ Skill violation: skill/ ディレクトリがありません"
            exit 1
          fi
          echo "✅ skill/ OK"